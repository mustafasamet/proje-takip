<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CRM — Lead Takibi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#B8843A;--gd:#8A6128;--gbg:rgba(184,132,58,.12);
  --dark:#1A1A18;--d2:#222220;--d3:#2A2A28;--d4:#343432;
  --tx:#E8E4DC;--tx2:#9A9690;--tx3:#5A5652;
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.1);
  --gr:#4CAF7D;--rd:#E05252;--rdbg:rgba(224,82,82,.1);
  --pu:#9D6FEA;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Login */
.login-wrap{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:var(--d2);border:1px solid var(--bd2);border-radius:20px;padding:40px 36px;width:100%;max-width:360px}
.login-brand{text-align:center;margin-bottom:24px}
.login-brand-name{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.login-brand-title{font-size:20px;font-weight:700;color:var(--tx)}
.login-sep{width:40px;height:2px;background:var(--gold);margin:12px auto;border-radius:99px}
.lfield{margin-bottom:12px}
.llbl{font-size:10px;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.linp{width:100%;padding:10px 14px;background:var(--d3);border:1.5px solid var(--bd2);border-radius:10px;color:var(--tx);font-size:14px;outline:none;transition:border .15s;font-family:inherit}
.linp:focus{border-color:var(--gold)}
.lerr{font-size:12px;color:var(--rd);margin-top:6px;display:none;text-align:center}
.lerr.show{display:block}
.lbtn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--gold);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit}
.lbtn:hover{background:var(--gd)}

/* Header */
.header{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--bd);background:var(--d2);flex-shrink:0}
.header-title{font-size:18px;font-weight:700;color:var(--tx)}
.header-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.stat{background:var(--d3);border:1px solid var(--bd);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--tx2);display:inline-flex;align-items:center;gap:5px}
.stat b{color:var(--tx);font-size:13px;font-weight:700}
.btn{padding:7px 14px;border-radius:8px;border:1px solid var(--bd2);background:var(--d3);color:var(--tx2);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{color:var(--gold);border-color:rgba(184,132,58,.4)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn-gold:hover{background:var(--gd);color:#fff}

/* Filters */
.filters{display:flex;gap:8px;padding:10px 24px;border-bottom:1px solid var(--bd);align-items:center;flex-wrap:wrap;flex-shrink:0;background:var(--d2)}
.filter{padding:4px 12px;border-radius:99px;border:1px solid var(--bd2);background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit}
.filter:hover,.filter.on{background:var(--gbg);color:var(--gold);border-color:rgba(184,132,58,.4)}
.search{flex:1;min-width:180px;padding:7px 12px;background:var(--d3);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-size:12px;outline:none;font-family:inherit}
.search:focus{border-color:var(--gold)}
select.search{flex:0;width:auto}

/* List */
.list{flex:1;overflow-y:auto;padding:12px 24px}
.lead-card{background:var(--d2);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px}
.lead-card:hover{border-color:var(--bd2);background:var(--d3)}
.score{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.s-h{background:#eaf3de;color:#27500A}
.s-m{background:#fff8ee;color:#8a5000}
.s-l{background:#fff2f2;color:#8a0000}
.lead-info{flex:1;min-width:0}
.lead-name{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px}
.lead-meta{font-size:11px;color:var(--tx3);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.lead-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.tag{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.t-new{background:rgba(74,158,255,.15);color:#4A9EFF}
.t-contacted{background:rgba(255,164,0,.15);color:#ffa400}
.t-qualified{background:rgba(109,40,217,.15);color:#9D6FEA}
.t-converted{background:rgba(12,206,107,.15);color:#0cce6b}
.t-lost{background:rgba(255,78,66,.15);color:#ff4e42}
.t-def{background:var(--d4);color:var(--tx2)}
.actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.act-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd2);background:var(--d3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.act-btn:hover{border-color:var(--gold)}

/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.ov.op{display:flex}
.md{background:var(--d2);border:1px solid var(--bd2);border-radius:16px;width:100%;max-width:580px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.md-head{padding:18px 20px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.md-body{overflow-y:auto;padding:16px 20px 20px;flex:1}
.md-title{font-size:15px;font-weight:700;color:var(--tx)}
.md-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.field{background:var(--d3);border-radius:8px;padding:10px 12px}
.field-lbl{font-size:10px;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.field-val{font-size:13px;color:var(--tx);font-weight:500;cursor:pointer}
.field-val:hover{color:var(--gold)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.crm-sel{width:100%;padding:8px 10px;background:var(--d3);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;cursor:pointer}
.crm-sel:focus{border-color:var(--gold)}
.mf{margin-bottom:12px}
.ml{font-size:10px;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.mi{width:100%;padding:9px 12px;background:var(--d3);border:1.5px solid var(--bd2);border-radius:8px;color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.mi:focus{border-color:var(--gold)}
textarea.mi{resize:vertical}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.empty{text-align:center;padding:60px;color:var(--tx3);font-size:13px}
.empty-ico{font-size:32px;margin-bottom:12px}
</style>
</head>
<body>

<!-- Login -->
<form class="login-wrap" id="login-wrap" onsubmit="doLogin(event)" method="post" action="javascript:void(0)">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-brand-name">Ajans Paneli</div>
      <div class="login-brand-title">CRM — Lead Takibi</div>
      <div class="login-sep"></div>
    </div>
    <div class="lfield"><div class="llbl">Kullanıcı Adı</div><input class="linp" id="l-user" type="text" name="username" autocomplete="username" placeholder="Kullanıcı adı" required></div>
    <div class="lfield"><div class="llbl">Şifre</div><input class="linp" id="l-pass" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required></div>
    <div class="lerr" id="l-err">Kullanıcı adı veya şifre hatalı</div>
    <button class="lbtn" type="submit">Giriş Yap</button>
  </div>
</form>

<!-- App -->
<div id="app" style="display:none;flex-direction:column;height:100%;overflow:hidden">

  <!-- Header -->
  <div class="header">
    <div style="flex:1">
      <div class="header-title">📊 CRM — Lead Takibi</div>
      <div class="header-sub">Meta ve diğer formlardan gelen potansiyel müşteriler</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="stat">Toplam <b id="st-total">0</b></div>
      <div class="stat">Satış <b id="st-sold" style="color:#0cce6b">0</b></div>
      <div class="stat">Potansiyel <b id="st-pot" style="color:#ffa400">0</b></div>
      <button class="btn btn-gold" onclick="openAdd()">+ Lead Ekle</button>
      <a href="/proje-takip/" class="btn" style="text-decoration:none">← Panele Dön</a>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input class="search" id="q" placeholder="🔍 İsim, mail, telefon ara..." oninput="renderLeads()">
    <button class="filter on" onclick="setFilter('all',this)">Hepsi</button>
    <button class="filter" onclick="setFilter('new',this)">🆕 Yeni</button>
    <button class="filter" onclick="setFilter('notcalled',this)">📵 Aranmadı</button>
    <button class="filter" onclick="setFilter('contacted',this)">📞 Arandı</button>
    <button class="filter" onclick="setFilter('qualified',this)">⭐ Nitelikli</button>
    <button class="filter" onclick="setFilter('converted',this)">✅ Satış</button>
    <button class="filter" onclick="setFilter('lost',this)">❌ Kayıp</button>
    <select class="search" id="sort-by" onchange="renderLeads()">
      <option value="score">Puana Göre</option>
      <option value="date">Tarihe Göre</option>
      <option value="name">İsme Göre</option>
    </select>
  </div>

  <!-- List -->
  <div class="list" id="lead-list"><div class="empty"><div class="empty-ico">⏳</div>Yükleniyor...</div></div>

</div>

<!-- Lead Detay Modal -->
<div class="ov" id="m-detail">
  <div class="md">
    <div class="md-head">
      <div><div class="md-title" id="det-name">Lead</div><div class="md-sub" id="det-sub"></div></div>
      <button class="btn" onclick="closeModal('m-detail')">✕</button>
    </div>
    <div class="md-body" id="det-body"></div>
  </div>
</div>

<!-- Lead Ekle Modal -->
<div class="ov" id="m-add">
  <div class="md" style="max-width:400px">
    <div class="md-head"><div class="md-title">Yeni Lead Ekle</div><button class="btn" onclick="closeModal('m-add')">✕</button></div>
    <div class="md-body">
      <div class="mf"><div class="ml">Ad Soyad *</div><input class="mi" id="a-name" placeholder="Ahmet Yılmaz"></div>
      <div class="mf"><div class="ml">Telefon *</div><input class="mi" id="a-phone" placeholder="05xx xxx xx xx"></div>
      <div class="mf"><div class="ml">E-posta</div><input class="mi" id="a-email" placeholder="ahmet@mail.com"></div>
      <div class="mf"><div class="ml">Web Sitesi</div><input class="mi" id="a-web" placeholder="site.com"></div>
      <div class="mf"><div class="ml">Kaynak</div>
        <select class="mi" id="a-src">
          <option value="manual">Manuel</option>
          <option value="meta">Meta Lead Form</option>
          <option value="sametsalik">sametsalik.com</option>
          <option value="referral">Referans</option>
        </select>
      </div>
      <div class="mf"><div class="ml">Not</div><textarea class="mi" id="a-note" rows="2" placeholder="İlk izlenim..."></textarea></div>
      <div class="macts">
        <button class="btn" onclick="closeModal('m-add')">İptal</button>
        <button class="btn btn-gold" onclick="saveAdd()">Ekle</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── AUTH ─────────────────────────────────────────────────────
const CREDS = {'samet':'Samet2024!','admin':'Ajans2024!'};
const SK = 'crm_session';

function checkAuth(){
  try{const d=JSON.parse(sessionStorage.getItem(SK)||'{}');return d.ts&&Date.now()-d.ts<8*60*60*1000;}catch(e){return false;}
}
function doLogin(e){
  e.preventDefault();
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  if(CREDS[u]&&CREDS[u]===p){
    sessionStorage.setItem(SK,JSON.stringify({u,ts:Date.now()}));
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('app').style.display='flex';
    loadLeads();
  } else {
    document.getElementById('l-err').classList.add('show');
    document.getElementById('l-pass').value='';
  }
}

// ── SUPABASE ─────────────────────────────────────────────────
const SUPABASE_URL='https://guphxhfdgaixhgadruqb.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1cGh4aGZkZ2FpeGhnYWRydXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjM3NzcsImV4cCI6MjA5MDg5OTc3N30.R3yQ6jTlYT1awL_mUYzJPlHOwgzDFOfUHsW-cpv72_c';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ── STATE ─────────────────────────────────────────────────────
let leads=[], activeFilter='all';

// ── PUAN ─────────────────────────────────────────────────────
function calcScore(l){
  let s=0;
  const b=String(l.aylik_butce||'');
  if(b.includes('200.000'))s+=40;else if(b.includes('50.000'))s+=30;
  else if(b.includes('20.000'))s+=20;else if(b.includes('10.000'))s+=15;
  else if(b.includes('5.000'))s+=10;
  const sur=String(l.reklam_suresi||'');
  if(sur.includes('5 y'))s+=25;else if(sur.includes('3 y')||sur.includes('4 y'))s+=20;
  else if(sur.includes('1 y')||sur.includes('2 y'))s+=15;else if(sur.includes('6 ay'))s+=10;
  if(String(l.acil_ihtiyac||'').toLowerCase().includes('evet'))s+=20;
  if(String(l.website||'').length>3)s+=10;
  if(String(l.video_icerik||'').toLowerCase().includes('evet'))s+=5;
  return Math.min(s,100);
}

// ── CRUD ─────────────────────────────────────────────────────
async function loadLeads(){
  document.getElementById('lead-list').innerHTML='<div class="empty"><div class="empty-ico">⏳</div>Yükleniyor...</div>';
  const {data,error}=await sb.from('leads').select('*').order('score',{ascending:false}).order('created_at',{ascending:false}).limit(500);
  if(error){console.error(error);return;}
  leads=(data||[]).map(l=>({...l,score:l.score||calcScore(l)}));
  updateStats();
  renderLeads();
}
async function saveLead(l){
  const row={full_name:l.full_name||'',email:l.email||'',phone:l.phone||'',website:l.website||'',
    source:l.source||'manual',form_name:l.form_name||'',campaign_name:l.campaign_name||'',
    reklam_platformu:l.reklam_platformu||'',reklam_suresi:l.reklam_suresi||'',
    aylik_butce:l.aylik_butce||'',memnuniyet:l.memnuniyet||'',
    acil_ihtiyac:l.acil_ihtiyac||'',video_icerik:l.video_icerik||'',
    status:l.status||'new',gorusme:l.gorusme||'',potansiyel:l.potansiyel||'',
    satis:l.satis||'',notes:l.notes||'',score:l.score||0,
    raw_data:l.raw_data||{},updated_at:new Date().toISOString()};
  if(l.id){const {error}=await sb.from('leads').update(row).eq('id',l.id);if(error)console.error(error);}
  else{const {data}=await sb.from('leads').insert(row).select().single();return data;}
}
async function deleteLead(id){await sb.from('leads').delete().eq('id',id);}

// ── STATS ─────────────────────────────────────────────────────
function updateStats(){
  document.getElementById('st-total').textContent=leads.length;
  document.getElementById('st-sold').textContent=leads.filter(l=>l.satis==='Yapıldı'||l.status==='converted').length;
  document.getElementById('st-pot').textContent=leads.filter(l=>l.score>=60).length;
}

// ── FILTER & RENDER ───────────────────────────────────────────
function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderLeads();
}
function renderLeads(){
  const el=document.getElementById('lead-list');
  const q=(document.getElementById('q').value||'').toLowerCase();
  const sort=document.getElementById('sort-by').value;
  let list=[...leads];
  if(activeFilter==='notcalled')list=list.filter(l=>!l.gorusme||l.gorusme===''||l.gorusme==='Aranmadı');
  else if(activeFilter!=='all')list=list.filter(l=>l.status===activeFilter);
  if(q)list=list.filter(l=>(l.full_name+l.email+l.phone+l.website).toLowerCase().includes(q));
  list.sort((a,b)=>{
    if(sort==='score')return(b.score||0)-(a.score||0);
    if(sort==='name')return(a.full_name||'').localeCompare(b.full_name||'');
    return new Date(b.created_at)-new Date(a.created_at);
  });
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-ico">📭</div>Lead bulunamadı</div>';return;}

  el.innerHTML='';
  list.forEach(l=>{
    const sc=l.score||0;
    const scCls=sc>=70?'s-h':sc>=40?'s-m':'s-l';
    const stTag={new:'t-new',contacted:'t-contacted',qualified:'t-qualified',converted:'t-converted',lost:'t-lost'}[l.status]||'t-new';
    const stLbl={new:'Yeni',contacted:'Arandı',qualified:'Nitelikli',converted:'Satış',lost:'Kayıp'}[l.status]||'Yeni';
    const date=l.created_at?new Date(l.created_at).toLocaleDateString('tr-TR'):'';
    const acilFlag=String(l.acil_ihtiyac||'').toLowerCase().includes('evet');

    const card=document.createElement('div');
    card.className='lead-card';
    card.onclick=()=>openDetail(l.id);
    card.innerHTML=
      '<div class="score '+scCls+'">'+sc+'</div>'+
      '<div class="lead-info">'+
        '<div class="lead-name">'+(l.full_name||'—')+'</div>'+
        '<div class="lead-meta">'+
          (l.phone?'<span>📞 '+l.phone+'</span>':'')+
          (l.email?'<span>✉️ '+l.email+'</span>':'')+
          (l.website?'<span>🌐 '+l.website+'</span>':'')+
          (date?'<span>📅 '+date+'</span>':'')+
        '</div>'+
        '<div class="lead-meta">'+
          (l.aylik_butce?'<span>💰 '+l.aylik_butce.substring(0,30)+'</span>':'')+
          (l.reklam_suresi?'<span>⏱ '+l.reklam_suresi.substring(0,30)+'</span>':'')+
          (acilFlag?'<span style="color:#ff4e42;font-weight:600">🚨 Acil</span>':'')+
        '</div>'+
        (l.memnuniyet?'<div class="lead-meta" style="color:var(--tx3)"><span>😐 '+l.memnuniyet.substring(0,40)+'</span></div>':'')+
        '<div class="lead-tags">'+
          '<span class="tag '+stTag+'">'+stLbl+'</span>'+
          (l.potansiyel?'<span class="tag t-def">'+l.potansiyel+'</span>':'')+
          (l.gorusme?'<span class="tag t-def">'+l.gorusme+'</span>':'')+
          (l.satis?'<span class="tag t-def">'+l.satis+'</span>':'')+
        '</div>'+
      '</div>'+
      '<div class="actions" id="acts-'+l.id+'"></div>';

    const acts=card.querySelector('#acts-'+l.id);
    acts.onclick=e=>e.stopPropagation();
    if(l.phone){
      const b1=document.createElement('button');b1.className='act-btn';b1.title='Kopyala';b1.textContent='📋';
      b1.onclick=()=>copyText(l.phone,'Telefon');acts.appendChild(b1);
      const b2=document.createElement('button');b2.className='act-btn';b2.title='Ara';b2.textContent='📞';
      b2.onclick=()=>window.open('tel:'+l.phone);acts.appendChild(b2);
    }
    if(l.email){
      const b3=document.createElement('button');b3.className='act-btn';b3.title='Mail';b3.textContent='✉️';
      b3.onclick=()=>copyText(l.email,'Mail');acts.appendChild(b3);
    }
    el.appendChild(card);
  });
}

// ── DETAIL MODAL ──────────────────────────────────────────────
function openDetail(id){
  const l=leads.find(x=>x.id===id);if(!l)return;
  document.getElementById('det-name').textContent=l.full_name||'Lead';
  document.getElementById('det-sub').textContent=(l.source||'')+(l.campaign_name?' · '+l.campaign_name:'');
  const body=document.getElementById('det-body');
  body.innerHTML='';
  const sc=l.score||0;
  const scC=sc>=70?'#0cce6b':sc>=40?'#ffa400':'#ff4e42';
  const date=l.created_at?new Date(l.created_at).toLocaleString('tr-TR'):'';

  // Skor
  const sd=document.createElement('div');
  sd.style.cssText='display:flex;align-items:center;gap:12px;margin-bottom:16px;background:var(--d3);border-radius:10px;padding:12px 16px';
  sd.innerHTML='<div style="font-size:28px;font-weight:700;color:'+scC+'">'+sc+'</div><div><div style="font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px">Potansiyel Puanı</div><div style="font-size:12px;color:var(--tx2);margin-top:2px">'+(sc>=70?'🔥 Yüksek':sc>=40?'📊 Orta':'📉 Düşük')+'</div></div><div style="flex:1;text-align:right;font-size:11px;color:var(--tx3)">📅 '+date+'</div>';
  body.appendChild(sd);

  // Helper
  const mkF=(lbl,val,copy)=>{
    const d=document.createElement('div');d.className='field';
    const l2=document.createElement('div');l2.className='field-lbl';l2.textContent=lbl;
    const v=document.createElement('div');v.className='field-val';v.textContent=(val||'—')+(copy?' 📋':'');
    if(copy&&val)v.onclick=()=>copyText(val,lbl);else v.style.cursor='default';
    d.appendChild(l2);d.appendChild(v);return d;
  };
  const mkS=(lbl,field,opts,cur)=>{
    const d=document.createElement('div');d.className='field';
    const lb=document.createElement('div');lb.className='field-lbl';lb.textContent=lbl;
    const sel=document.createElement('select');sel.className='crm-sel';
    opts.forEach(([v,t])=>{const o=document.createElement('option');o.value=v;o.textContent=t;if(v===cur)o.selected=true;sel.appendChild(o);});
    sel.onchange=()=>updateField(l.id,field,sel.value);
    d.appendChild(lb);d.appendChild(sel);return d;
  };

  // İletişim
  const g1=document.createElement('div');g1.className='grid2';
  g1.appendChild(mkF('Telefon',l.phone,true));
  g1.appendChild(mkF('E-posta',l.email,true));
  g1.appendChild(mkF('Web Sitesi',l.website,true));
  g1.appendChild(mkF('Kaynak',l.source,false));
  body.appendChild(g1);

  // Form cevapları
  const formFields=[
    ['Aylık Bütçe',l.aylik_butce],['Reklam Süresi',l.reklam_suresi],
    ['Acil İhtiyaç',l.acil_ihtiyac],['Memnuniyet',l.memnuniyet],
    ['Platform',l.reklam_platformu],['Video İçerik',l.video_icerik]
  ].filter(([,v])=>v);
  if(formFields.length){
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px';
    lbl.textContent='Form Cevapları';body.appendChild(lbl);
    const g2=document.createElement('div');g2.className='grid2';g2.style.marginBottom='14px';
    formFields.forEach(([l2,v])=>g2.appendChild(mkF(l2,v,false)));
    body.appendChild(g2);
  }

  // CRM
  const lbl2=document.createElement('div');
  lbl2.style.cssText='font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px';
  lbl2.textContent='CRM Durumu';body.appendChild(lbl2);
  const g3=document.createElement('div');g3.className='grid2';g3.style.marginBottom='14px';
  g3.appendChild(mkS('Durum','status',[['new','🆕 Yeni'],['contacted','📞 Arandı'],['qualified','⭐ Nitelikli'],['converted','✅ Satış'],['lost','❌ Kayıp']],l.status));
  g3.appendChild(mkS('Görüşme','gorusme',[['','Seç...'],['Aranmadı','Aranmadı'],['Arandı','Arandı'],['Görüşüldü','Görüşüldü'],['Takipte','Takipte'],['Ulaşılamadı','Ulaşılamadı']],l.gorusme||''));
  g3.appendChild(mkS('Potansiyel','potansiyel',[['','Seç...'],['Düşük','📉 Düşük'],['Orta','📊 Orta'],['Yüksek','🔥 Yüksek']],l.potansiyel||''));
  g3.appendChild(mkS('Satış','satis',[['','Seç...'],['Yapıldı','✅ Yapıldı'],['Potansiyel','⭐ Potansiyel'],['Değil','❌ Değil']],l.satis||''));
  body.appendChild(g3);

  // Not
  const nf=document.createElement('div');nf.className='field';nf.style.marginBottom='12px';
  const nlbl=document.createElement('div');nlbl.className='field-lbl';nlbl.textContent='Notlar';
  const nta=document.createElement('textarea');
  nta.style.cssText='width:100%;background:transparent;border:none;outline:none;color:var(--tx);font-size:13px;font-family:inherit;resize:vertical;min-height:70px;line-height:1.6;box-sizing:border-box';
  nta.placeholder='Görüşme notu...';nta.value=l.notes||'';
  nta.onblur=()=>updateField(l.id,'notes',nta.value);
  nf.appendChild(nlbl);nf.appendChild(nta);body.appendChild(nf);

  // Sil
  const dr=document.createElement('div');dr.style.cssText='display:flex;justify-content:flex-end';
  const db=document.createElement('button');
  db.style.cssText='font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid var(--rd);background:transparent;color:var(--rd);cursor:pointer;font-family:inherit';
  db.textContent='🗑 Sil';db.onclick=()=>doDelete(l.id);
  dr.appendChild(db);body.appendChild(dr);

  document.getElementById('m-detail').classList.add('op');
}
async function updateField(id,field,val){
  const l=leads.find(x=>x.id===id);if(!l)return;
  l[field]=val;await saveLead(l);
  if(field!=='notes'){renderLeads();updateStats();}
}
async function doDelete(id){
  if(!confirm('Bu lead silinecek. Emin misiniz?'))return;
  await deleteLead(id);leads=leads.filter(l=>l.id!==id);
  closeModal('m-detail');renderLeads();updateStats();
}

// ── ADD LEAD ─────────────────────────────────────────────────
function openAdd(){document.getElementById('m-add').classList.add('op');}
async function saveAdd(){
  const name=document.getElementById('a-name').value.trim();
  const phone=document.getElementById('a-phone').value.trim();
  if(!name&&!phone){alert('İsim veya telefon girin');return;}
  const l={full_name:name,phone,
    email:document.getElementById('a-email').value.trim(),
    website:document.getElementById('a-web').value.trim(),
    source:document.getElementById('a-src').value,
    notes:document.getElementById('a-note').value.trim(),
    status:'new'};
  l.score=calcScore(l);
  const saved=await saveLead(l);
  if(saved){leads.unshift({...l,...saved});renderLeads();updateStats();}
  closeModal('m-add');
  ['a-name','a-phone','a-email','a-web','a-note'].forEach(id=>document.getElementById(id).value='');
}

// ── HELPERS ───────────────────────────────────────────────────
function copyText(val,lbl){
  navigator.clipboard.writeText(val).catch(()=>{});
  // Küçük toast
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--d2);border:1px solid var(--bd2);border-radius:8px;padding:8px 16px;font-size:12px;color:var(--tx);z-index:999;pointer-events:none';
  t.textContent=lbl+' kopyalandı ✓';document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}
function closeModal(id){document.getElementById(id).classList.remove('op');}
document.querySelectorAll('.ov').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('op');}));

// ── INIT ──────────────────────────────────────────────────────
if(checkAuth()){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').style.display='flex';
  loadLeads();
} else {
  document.getElementById('l-user').focus();
}
</script>
</body>
</html>
